name: Build and publish resume

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write build version file
        run: |
          cat > build-version.tex <<EOF
          \renewcommand{\doccommit}{${GITHUB_SHA::7}}
          EOF

      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv-llt.tex
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf-${{ github.sha }}
          path: cv-llt.pdf
          retention-days: 14

  release-and-publish:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write build version file
        run: |
          cat > build-version.tex <<EOF
          \renewcommand{\doccommit}{${GITHUB_SHA::7}}
          EOF

      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv-llt.tex
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Resume ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            cv-llt.pdf

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p site
          touch site/.nojekyll
          cp cv-llt.pdf site/latest.pdf
          cp web/index.html site/index.html
          cat > site/manifest.json <<EOF
          {
            "tag": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA::7}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "pdf": "latest.pdf",
            "pdfSha256": "$(sha256sum cv-llt.pdf | awk '{print $1}')",
            "source": "https://github.com/xiangyuw1/resume"
          }
          EOF

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true
